<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>oiiiii</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            background:#ffe4ec;
            overflow:hidden;
        }

        .container{
            text-align:center;
        }

        h1{
            margin-bottom:40px;
            color:#d63384;
        }

        .botoes{
            display:flex;
            justify-content:center;
            gap:20px;
        }

        button{
            width:120px;
            height:50px;
            font-size:18px;
            border:none;
            border-radius:12px;
            cursor:pointer;
            transition:0.2s;
        }

        #sim{
            background:#28a745;
            color:white;
        }

        #sim:hover{
            transform:scale(1.08);
        }

        #nao{
            background:#dc3545;
            color:white;
            position:fixed;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>quer namorar comigo gio 
          😘
        </h1>

        <div class="botoes">
            <button id="sim">Sim</button>
            <button id="nao">Não</button>
        </div>
    </div>

<script src="script.js"></script>

</body>
</html>
